name: Rust CI (Reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'The working directory where the Cargo.toml is located'
        required: false
        default: '.'
        type: string
      rust-version:
        description: 'The Rust toolchain version to use (e.g., stable, beta, nightly)'
        required: false
        default: 'stable'
        type: string
      repository:
        description: 'The repository to checkout'
        required: false
        default: ''
        type: string
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        if: ${{ secrets.APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: neko32
          repositories: ${{ inputs.repository || github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        if: ${{ secrets.APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: neko32
          repositories: ${{ inputs.repository || github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Run tests
        run: cargo test --verbose
